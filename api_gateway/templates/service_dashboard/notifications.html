<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Notifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5" style="max-width: 600px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold">Notifications</h3>
            <a href="{% url 'dashboard' %}" class="btn btn-sm btn-outline-primary">Back to Dashboard</a>
        </div>

        <div class="list-group shadow-sm">
            {% for notif in notifications %}
                <a href="#" class="list-group-item list-group-item-action p-3 {% if not notif.is_read %}bg-white border-primary border-start border-4{% else %}bg-light text-muted{% endif %}" aria-current="true">
                    <div class="d-flex w-100 justify-content-between">
                        <h5 class="mb-1 {% if not notif.is_read %}fw-bold text-primary{% else %}text-dark{% endif %}">
                            {{ notif.title }}
                            {% if not notif.is_read %}
                                <span class="badge bg-primary rounded-pill ms-2" style="font-size: 0.6em;">NEW</span>
                            {% endif %}
                        </h5>
                        <small class="{% if not notif.is_read %}fw-bold text-primary{% else %}text-muted{% endif %}">
                            {{ notif.created_at }}
                        </small>
                    </div>
                    <p class="mb-1">{{ notif.message }}</p>
                </a>
            {% empty %}
                <div class="list-group-item p-5 text-center bg-white">
                    <h5 class="text-muted mb-0">You have no new notifications.</h5>
                </div>
            {% endfor %}
            </div>
        
        <div class="text-center mt-3 text-muted small">
            End of notifications
        </div>
    </div>

</body>
</html>
