version: '3.8'

services:
  gateway:
    build: ./api_gateway
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=gateway_secret_key_123
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  user_service:
    build: ./user_service
    ports:
      - "8001:8001"
    environment:
      - DEBUG=True
      - SECRET_KEY=user_secret_key_456
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8001"

  ngo_service:
    build: ./ngo_service
    ports:
      - "8002:8002"
    environment:
      - DEBUG=True
      - SECRET_KEY=ngo_secret_key_789
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8002"

  registration_service:
    build: ./registration_service
    ports:
      - "8003:8003"
    environment:
      - DEBUG=True
      - SECRET_KEY=registration_secret_key_000
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8003"